<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你愛我嗎？</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" loop>
        <source src="love.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="mainContainer">
        <h1>你愛我嗎？</h1>
        
        <div class="question-box">
            <p class="question">你愛我嗎？</p>
            <input type="text" id="answer" placeholder="在此輸入答案..." autocomplete="off">
            <div id="feedback" class="feedback"></div>
        </div>

        <button onclick="checkAnswer()">提交答案</button>
    </div>

    <div id="loveTexts"></div>

    <!-- 黑色模式下的「我愛你」按鈕 -->
    <button id="loveButton" class="love-button" onclick="showFinalScreen()">
        我愛你
    </button>

    <div id="finalMessage" class="final-screen"></div>

    <script src="script.js"></script>
</body>
</html>
